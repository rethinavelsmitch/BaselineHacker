<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #040404;
      --card: #0c0c0c;
      --ink-900: #f1f3f6;
      --ink-700: rgba(241, 243, 246, 0.78);
      --ink-500: rgba(241, 243, 246, 0.52);
      --line: rgba(241, 243, 246, 0.14);
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-full: 9999px;
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --track-a: #f5b83d;
      --track-b: #7fc542;
      --track-c: #43c8b8;
      --track-d: #48a7dc;
      --track-e: #3f7de2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--ink-900);
      min-height: 100vh;
      line-height: 1.45;
    }

    .app-header {
      background: #111827;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-full);
      padding: 6px 13px;
      text-decoration: none;
    }
    .header-title {
      color: #f9fafb;
      font-size: 18px;
      font-weight: 600;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .page {
      max-width: 500px;
      margin: 0 auto;
      padding: 14px 12px 24px;
    }

    .score-summary {
      background: var(--card);
      border: 1px solid rgba(241, 243, 246, 0.08);
      border-radius: var(--radius-lg);
      padding: 14px 10px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
    }
    .score-cell { text-align: center; }
    .score-label {
      font-size: 10px;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--ink-500);
      margin-bottom: 4px;
      font-weight: 700;
    }
    .score-value {
      font-size: 34px;
      font-weight: 700;
      color: var(--ink-900);
    }
    .score-arrow {
      color: #06b6d4;
      font-size: 22px;
      font-weight: 700;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .score-delta {
      margin-top: 2px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--ink-700);
      text-align: center;
      font-weight: 600;
    }

    .timeline-wrap {
      position: relative;
      padding-top: 6px;
      padding-bottom: 10px;
      max-height: calc(100vh - 240px);
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      min-height: 560px;
    }
    .journey-start-pill {
      position: absolute;
      left: 50%;
      top: 6px;
      transform: translateX(-50%);
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(241, 243, 246, 0.18);
      background: #121212;
      color: var(--ink-900);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.36);
    }
    .journey-start-pill .start-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #71f0ff;
      box-shadow: 0 0 0 3px rgba(113, 240, 255, 0.2);
    }
    .timeline-wrap::-webkit-scrollbar { width: 6px; }
    .timeline-wrap::-webkit-scrollbar-thumb {
      background: rgba(241, 243, 246, 0.28);
      border-radius: var(--radius-full);
    }
    .path-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .journey-path {
      fill: none;
      stroke: url(#trackGradient);
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 2200;
      stroke-dashoffset: 2200;
      animation: draw 2.4s ease forwards;
    }
    .journey-end-icon {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #0c0c0c;
      border: 1px solid rgba(241, 243, 246, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #71f0ff;
      z-index: 2;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }
    .journey-end-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .phase-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 24px;
    }
    .phase-row {
      display: flex;
      min-height: 150px;
    }
    .phase-row.left .phase-card { margin-left: auto; }
    .phase-row.right .phase-card { margin-right: auto; }

    .phase-card {
      background: var(--card);
      border: 1px solid rgba(241, 243, 246, 0.12);
      border-radius: var(--radius-md);
      padding: 9px 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.36);
      transform: translateY(12px);
      opacity: 0;
      animation: reveal 420ms ease forwards;
      min-height: 132px;
      width: min(206px, 50vw);
    }
    .phase-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 2px;
    }
    .phase-id {
      font-size: 10px;
      color: var(--ink-500);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .phase-points {
      font-size: 11px;
      color: #71f0ff;
      font-weight: 700;
    }
    .phase-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-900);
      margin-bottom: 2px;
      line-height: 1.2;
    }
    .phase-type {
      display: inline-block;
      font-size: 10px;
      color: var(--ink-700);
      border: 1px solid rgba(241, 243, 246, 0.16);
      border-radius: var(--radius-full);
      padding: 2px 8px;
      margin-bottom: 6px;
      font-weight: 600;
      background: #121212;
    }
    .phase-note {
      background: #121212;
      border: 1px solid rgba(241, 243, 246, 0.12);
      border-radius: 10px;
      padding: 6px;
      font-size: 9.5px;
      color: var(--ink-700);
      min-height: 54px;
      line-height: 1.45;
    }
    .phase-note strong {
      color: var(--ink-900);
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.14); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="back-btn" href="improve.html">← Back</a>
    <span class="header-title">Score Journey</span>
  </header>

  <div class="page">
    <div class="score-summary">
      <div class="score-cell">
        <div class="score-label">Current Score</div>
        <div class="score-value" id="currentScore">0.0</div>
      </div>
      <div class="score-arrow">→</div>
      <div class="score-cell">
        <div class="score-label">Target Score</div>
        <div class="score-value" id="targetScore">0.0</div>
      </div>
    </div>
    <div class="score-delta" id="deltaText">+0.0 projected improvement</div>

    <div class="timeline-wrap">
      <div class="journey-start-pill"><span class="start-dot"></span>You are here</div>
      <svg class="path-svg" viewBox="0 0 420 960" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--track-a)" />
            <stop offset="25%" stop-color="var(--track-b)" />
            <stop offset="50%" stop-color="var(--track-c)" />
            <stop offset="75%" stop-color="var(--track-d)" />
            <stop offset="100%" stop-color="var(--track-e)" />
          </linearGradient>
        </defs>
        <path class="journey-path" id="journeyPath" d="M210 48 C340 96, 340 176, 210 228 C80 280, 80 360, 210 412 C340 464, 340 544, 210 596 C80 648, 80 728, 210 780 C340 832, 340 912, 210 948" />
      </svg>
      <div class="phase-list" id="phaseList"></div>
      <div class="journey-end-icon" id="journeyEndIcon" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    function getInferenceColor(score) {
      if (score > 85) return '#8DE28D';
      if (score > 75) return '#71F0FF';
      if (score > 65) return '#F4C764';
      if (score > 50) return '#FB923C';
      return '#F87171';
    }

    function loadPayload() {
      try {
        return JSON.parse(localStorage.getItem('dh_journey_payload') || '{}');
      } catch (e) {
        return {};
      }
    }

    function getEndIconMarkup(score) {
      if (score > 85) {
        return '<svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 5-3.2 8.7-7 10-3.8-1.3-7-5-7-10V6l7-3z"></path><path d="M8.5 12.5l2.2 2.2 4.8-4.8"></path></svg>';
      }
      if (score > 75) {
        return '<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.6-7-10a4 4 0 0 1 7-2.4A4 4 0 0 1 19 11c0 5.4-7 10-7 10z"></path><path d="M8 12h2l1-2 2 4 1-2h2"></path></svg>';
      }
      if (score > 65) {
        return '<svg viewBox="0 0 24 24"><path d="M4 13h4l2-6 4 12 2-6h4"></path><path d="M3 6h18"></path></svg>';
      }
      if (score > 50) {
        return '<svg viewBox="0 0 24 24"><path d="M12 3l9 16H3l9-16z"></path><path d="M12 9v5"></path><path d="M12 17h.01"></path></svg>';
      }
      return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M9 9l6 6"></path><path d="M15 9l-6 6"></path></svg>';
    }

    function init() {
      const payload = loadPayload();
      const current = Number(payload.currentScore || 0);
      const target = Number(payload.targetScore || current);
      const actions = Array.isArray(payload.actions) ? payload.actions : [];

      const currentEl = document.getElementById('currentScore');
      const targetEl = document.getElementById('targetScore');
      currentEl.textContent = current.toFixed(1);
      targetEl.textContent = target.toFixed(1);
      currentEl.style.color = getInferenceColor(current);
      targetEl.style.color = getInferenceColor(target);
      document.getElementById('deltaText').textContent =
        `${(target - current >= 0 ? '+' : '') + (target - current).toFixed(1)} projected improvement`;

      const list = document.getElementById('phaseList');
      if (!actions.length) {
        list.innerHTML = '<div class="phase-card"><div class="phase-title">No selected actions</div><div class="phase-note"><strong>Recommendation</strong>Go back and choose actions to build your score journey.</div></div>';
        const endIconEmpty = document.getElementById('journeyEndIcon');
        endIconEmpty.innerHTML = getEndIconMarkup(target);
        endIconEmpty.style.color = getInferenceColor(target);
        endIconEmpty.style.top = '500px';
        return;
      }

      list.innerHTML = actions.map((action, idx) => {
        const isLeft = idx % 2 === 0;
        const delay = idx * 150;
        const rec = action.recommendation || 'Follow this action consistently to improve your score.';
        return `
        <div class="phase-row ${isLeft ? 'left' : 'right'}">
          <div class="phase-card" style="animation-delay:${delay + 60}ms">
            <div class="phase-head">
              <div class="phase-id">Phase ${String(idx + 1).padStart(2, '0')}</div>
              <div class="phase-points">+${Number(action.points || 0).toFixed(1)} pts</div>
            </div>
            <div class="phase-title">${action.label || 'Action'}</div>
            <div class="phase-type">${action.type || 'Action'}</div>
            <div class="phase-note"><strong>Recommendation</strong>${rec}</div>
          </div>
        </div>
      `; }).join('');

      // Stretch the timeline curve to the full scroll content height.
      const wrap = document.querySelector('.timeline-wrap');
      const svg = document.querySelector('.path-svg');
      const path = document.getElementById('journeyPath');
      const contentHeight = Math.max(wrap.clientHeight, list.scrollHeight + 140);
      const waves = Math.max(actions.length + 1, 5);
      const startY = 42;
      const step = (contentHeight - startY - 24) / waves;
      let y = startY;
      let d = `M210 ${startY.toFixed(1)}`;
      for (let i = 0; i < waves; i++) {
        const dirX = i % 2 === 0 ? 342 : 78;
        const c1y = y + step * 0.35;
        const c2y = y + step * 0.85;
        y += step;
        d += ` C${dirX} ${c1y.toFixed(1)}, ${dirX} ${c2y.toFixed(1)}, 210 ${y.toFixed(1)}`;
      }
      svg.style.height = contentHeight + 'px';
      svg.setAttribute('viewBox', `0 0 420 ${Math.round(contentHeight)}`);
      path.setAttribute('d', d);

      const endIcon = document.getElementById('journeyEndIcon');
      endIcon.innerHTML = getEndIconMarkup(target);
      endIcon.style.color = getInferenceColor(target);
      endIcon.style.top = `${contentHeight - 52}px`;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>

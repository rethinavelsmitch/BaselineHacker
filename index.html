<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseline Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Deep Holistics Design System ─── */
    :root {
      --bg-black: #040404;
      --bg-card: #0C0C0C;
      --bg-elevated: #121212;
      --red-violet: #CA0F88;
      --electric-blue: #4900FF;
      --royal-purple: #5C05A5;
      --neon-mint: #71F0FF;
      --off-white: #F1F3F6;
      --text-primary: #F1F3F6;
      --text-secondary: rgba(241, 243, 246, 0.75);
      --text-muted: rgba(241, 243, 246, 0.5);
      --border-subtle: rgba(241, 243, 246, 0.08);
      --border-default: rgba(241, 243, 246, 0.12);
      --gradient-main: linear-gradient(135deg, #CA0F88 0%, #5C05A5 50%, #4900FF 100%);
      --gradient-accent: linear-gradient(135deg, #4900FF 0%, #5C05A5 100%);
      --gradient-ring: conic-gradient(from 0deg, #CA0F88, #5C05A5, #4900FF, #71F0FF);
      --gradient-card: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(92, 5, 165, 0.15) 0%, transparent 70%);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 24px rgba(202, 15, 136, 0.25);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms ease;
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      background: var(--bg-black);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Layout ─── */
    .app-container {
      max-width: none !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 0 24px 32px;
      box-sizing: border-box;
    }



    /* ─── Section Card ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-top: 16px;
      overflow: hidden;
      width: 100%;
      max-width: none;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: var(--gradient-card);
      pointer-events: none;
    }

    .card-header {
      padding: 16px 20px 0;
    }

    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    /* ─── Score Ring ─── */
    .score-card-top {
      background: radial-gradient(ellipse 100% 80% at 50% 0%, rgba(92, 5, 165, 0.2) 0%, transparent 60%);
      padding: 28px 20px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }



    .score-ring-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 12px;
      z-index: 2;
    }

    .score-ring-wrapper svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: var(--border-default);
      stroke-width: 10;
    }

    .score-ring-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 439.82;
      stroke-dashoffset: 439.82;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .score-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-number {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -1.5px;
      line-height: 1;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .score-of {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .score-band-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      position: relative;
      z-index: 2;
    }

    .band-compromised {
      background: rgba(239, 68, 68, 0.2);
      color: #F87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .band-struggling {
      background: rgba(249, 115, 22, 0.2);
      color: #FB923C;
      border: 1px solid rgba(249, 115, 22, 0.3);
    }

    .band-stable {
      background: rgba(251, 191, 36, 0.2);
      color: #FBBF24;
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .band-healthy {
      background: rgba(113, 240, 255, 0.15);
      color: var(--neon-mint);
      border: 1px solid rgba(113, 240, 255, 0.3);
    }

    .band-elite {
      background: rgba(92, 5, 165, 0.3);
      color: #A78BFA;
      border: 1px solid rgba(92, 5, 165, 0.5);
    }

    .last-updated {
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
      z-index: 2;
    }

    /* ─── Why This Score ─── */
    .why-score {
      padding: 24px;
      --why-stagger: 80ms;
      background: linear-gradient(135deg, rgba(92, 5, 165, 0.08) 0%, rgba(73, 0, 255, 0.04) 100%);
    }

    .why-score h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    /* Grid layout */
    .why-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 768px) {
      .why-grid {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .why-grid .why-card-span {
        grid-column: 1 / -1;
      }
    }

    /* Animated cards */
    .why-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: whyCardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .why-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(202, 15, 136, 0.3), transparent);
      opacity: 0;
      animation: shimmer 2s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .why-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 0 1px rgba(202, 15, 136, 0.1);
      border-color: rgba(202, 15, 136, 0.25);
    }

    .why-card.why-delay-1 {
      animation-delay: 0.1s;
    }

    .why-card.why-delay-2 {
      animation-delay: 0.25s;
    }

    .why-card.why-delay-3 {
      animation-delay: 0.4s;
    }

    .why-card.why-delay-4 {
      animation-delay: 0.55s;
    }

    .why-card.why-delay-5 {
      animation-delay: 0.7s;
    }

    .why-card.why-delay-6 {
      animation-delay: 0.85s;
    }

    @keyframes whyCardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes whyItemIn {
      to {
        opacity: 1;
      }
    }

    /* Hero card - Why X? */
    .why-hero {
      background: linear-gradient(135deg, rgba(92, 5, 165, 0.2) 0%, rgba(73, 0, 255, 0.1) 100%);
      border: 1.5px solid rgba(202, 15, 136, 0.3);
      position: relative;
      overflow: hidden;
    }

    .why-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-main);
      box-shadow: 0 0 20px rgba(202, 15, 136, 0.4);
    }

    .why-hero::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(202, 15, 136, 0.05) 0%, transparent 70%);
      animation: heroGlow 8s ease-in-out infinite;
    }

    @keyframes heroGlow {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, 20px); }
    }

    .why-hero-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .why-hero-title .score-val {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 24px;
    }

    .why-hero-body {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .why-hero-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .why-hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .why-hero-tags .tag-lim {
      color: #F87171;
      font-weight: 600;
    }

    .why-hero-tags .tag-help {
      color: var(--neon-mint);
      font-weight: 600;
    }

    /* Limiters & helpers lists */
    .why-list-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .why-list-title.limiting {
      color: #F87171;
    }

    .why-list-title.helping {
      color: var(--neon-mint);
    }

    .why-list-subtitle {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-top: 2px;
      margin-bottom: 10px;
    }

    .why-notes-eg {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .why-marker-line {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      padding: 10px 14px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.02) 100%);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-family: var(--font-sans);
      opacity: 0;
      animation: whyItemIn 0.5s ease forwards;
      transition: all 0.25s ease;
    }

    .why-marker-line:hover {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.04) 100%);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateX(4px);
    }

    .why-marker-line:nth-child(5) {
      animation-delay: 0.05s;
    }

    .why-marker-line:nth-child(6) {
      animation-delay: 0.1s;
    }

    .why-marker-line:nth-child(7) {
      animation-delay: 0.15s;
    }

    .why-marker-line:nth-child(8) {
      animation-delay: 0.2s;
    }

    .why-marker-line:nth-child(9) {
      animation-delay: 0.25s;
    }

    .why-marker-line .marker-id {
      color: var(--text-muted);
      font-weight: 500;
    }

    .why-marker-line .marker-status {
      font-weight: 600;
    }

    .why-marker-line.negative .marker-status {
      color: #F87171;
    }

    .why-marker-line.positive .marker-status {
      color: var(--neon-mint);
    }

    .why-priority-order {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
      line-height: 1.5;
    }

    .why-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-sm);
      cursor: help;
      position: relative;
      border: 1px solid transparent;
      transition: all 0.25s ease;
      opacity: 0;
      animation: whyItemIn 0.5s ease forwards;
    }

    .why-list-item:nth-child(2) {
      animation-delay: 0.05s;
    }

    .why-list-item:nth-child(3) {
      animation-delay: 0.1s;
    }

    .why-list-item:nth-child(4) {
      animation-delay: 0.15s;
    }

    .why-list-item:nth-child(5) {
      animation-delay: 0.2s;
    }

    .why-list-item:nth-child(6) {
      animation-delay: 0.25s;
    }

    .why-list-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-default);
    }

    .why-list-item:last-child {
      margin-bottom: 0;
    }

    .why-list-item .severity-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .why-list-item .severity-dot.critical {
      background: #EF4444;
      color: rgba(239, 68, 68, 0.5);
    }

    .why-list-item .severity-dot.moderate {
      background: #FBBF24;
      color: rgba(251, 191, 36, 0.5);
    }

    .why-list-item .severity-dot.positive {
      background: #22C55E;
      color: rgba(34, 197, 94, 0.5);
    }

    .why-list-item .item-name {
      font-weight: 500;
      flex: 1;
      min-width: 0;
    }

    .why-list-item .item-detail {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .why-list-item .info-icon {
      flex-shrink: 0;
      opacity: 0.6;
      font-size: 11px;
    }

    /* Score breakdown */
    .breakdown-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
      color: var(--text-secondary);
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      opacity: 0;
      animation: whyItemIn 0.5s ease forwards;
    }

    .breakdown-row:nth-child(2) {
      animation-delay: 0.1s;
    }

    .breakdown-row:nth-child(3) {
      animation-delay: 0.2s;
    }

    .breakdown-row:nth-child(4) {
      animation-delay: 0.3s;
    }

    .breakdown-row:last-child {
      margin-bottom: 0;
    }

    .breakdown-label {
      font-size: 13px;
      color: var(--text-primary);
      min-width: 0;
      flex: 1;
    }

    .breakdown-bar-track {
      flex: 0 0 100px;
      height: 10px;
      background: var(--bg-black);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .breakdown-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--gradient-main);
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0;
    }

    .breakdown-pct {
      font-size: 12px;
      font-weight: 600;
      min-width: 38px;
      text-align: right;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }



    /* Tooltip */
    .why-tooltip {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 6px;
      padding: 10px 12px;
      background: var(--bg-black);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      z-index: 50;
      display: none;
      box-shadow: var(--shadow-lg);
    }

    .why-list-item:hover .why-tooltip,
    .why-list-item:focus-within .why-tooltip {
      display: block;
    }

    /* ─── CTA Chips ─── */
    .cta-chips {
      display: flex;
      gap: 8px;
      padding: 0 20px 20px;
      flex-wrap: wrap;
    }

    .cta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      background: var(--bg-elevated);
      color: var(--neon-mint);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }

    .cta-chip:hover {
      background: var(--gradient-main);
      color: var(--off-white);
      border-color: transparent;
      box-shadow: var(--shadow-glow);
    }

    .cta-chip:focus-visible {
      outline: 2px solid var(--electric-blue);
      outline-offset: 2px;
    }











    /* ─── Animations ─── */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: slideUp 0.5s ease both;
    }

    .animate-in:nth-child(1) {
      animation-delay: 0.05s;
    }

    .animate-in:nth-child(2) {
      animation-delay: 0.1s;
    }

    .animate-in:nth-child(3) {
      animation-delay: 0.15s;
    }

    .animate-in:nth-child(4) {
      animation-delay: 0.2s;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-elevated);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-default);
      z-index: 200;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Mobile Navigation (reference style) ─── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 12px;
      right: 12px;
      background: rgba(28, 28, 30, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px 24px 0 0;
      z-index: 100;
      padding: 12px 0 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: none;
    }

    .mobile-nav::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .mobile-nav-tabs {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 56px;
      width: 100%;
      padding: 0 8px;
    }

    .mobile-nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-sans);
      border-radius: 16px;
      position: relative;
    }

    .mobile-nav-tab:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .mobile-nav-tab.active {
      color: rgba(255, 255, 255, 1);
    }

    .mobile-nav-tab.active::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      z-index: -1;
    }

    .mobile-nav-tab.active .mobile-nav-icon {

  <!-- Toast -->

  <script>
    /* ═══════════════════════════════════════════
       DATA MODEL
       ═══════════════════════════════════════════ */

    const BASELINE = {
      score: 63.7,
      uncappedScore: 77,   // When set, score is capped by top limiter
      cappingFactor: 'Vitamin D',
      lastUpdated: '2026-03-04T14:30:00Z',
      contributors: {

          { id: 'B1', metric: 'Vitamin D', value: '18', unit: 'ng/ml', status: 'Severely deficient', contribution: 11, potentialPoints: 4 },
          { id: 'B2', metric: 'Sleep Quality', value: '42', unit: '%', status: 'Poor consistency', contribution: 9, potentialPoints: 3 }

          { id: 'A4', metric: 'Blood Glucose', value: '92', unit: 'mg/DL', status: 'Optimal', contribution: 8 },
          { id: 'B4', metric: 'Blood Pressure', value: '118/72', unit: 'mmHg', status: 'Optimal', contribution: 6 }
        ],
        priorityOrder: ['A1', 'A2', 'B1', 'B2', 'A5', 'B5', 'C1', 'C2', 'C3'],

      },
      scoreAreas: [
        { name: 'Core Health (metabolism, fitness)', pct: 72, markers: ['VO2 Max', 'BMI', 'Sleep Quality'] },
        { name: 'Lipids & inflammation', pct: 58, markers: ['HDL Cholesterol', 'Blood Glucose'] },
        { name: 'Vitamins & nutrients', pct: 42, markers: ['Vitamin D'] }
      ]
    };

    const INTERVENTIONS = [
      {
        id: 'supplements', label: 'Supplements', icon: '💊', baseImpact: 4.2,
        biomarkers: [
          { name: 'Vitamin D', improvement: 35 },
          { name: 'Iron', improvement: 15 }
        ]
      },
      {
        id: 'food', label: 'Food', icon: '🥗', baseImpact: 3.8,
        biomarkers: [
          { name: 'HDL Cholesterol', improvement: 12 },
          { name: 'Blood Glucose', improvement: 5 },
          { name: 'Triglycerides', improvement: 10 }
        ]
      },
      {
        id: 'sleep', label: 'Sleep', icon: '😴', baseImpact: 3.5,
        biomarkers: [
          { name: 'Sleep Quality', improvement: 30 },
          { name: 'Cortisol', improvement: 15 },
          { name: 'HRV', improvement: 10 }
        ]
      },
      {
        id: 'strength', label: 'Strength Training', icon: '🏋️', baseImpact: 3.2,
        biomarkers: [
          { name: 'Testosterone', improvement: 12 },
          { name: 'BMI', improvement: 5 },
          { name: 'Bone Density', improvement: 8 }
        ]
      },
      {
        id: 'endurance', label: 'Endurance', icon: '🏃', baseImpact: 3.0,
        biomarkers: [
          { name: 'VO2 Max', improvement: 20 },
          { name: 'HDL Cholesterol', improvement: 8 },
          { name: 'Blood Pressure', improvement: 10 }
        ]
      },
      {
        id: 'stop_alcohol', label: 'Stop Alcohol', icon: '🚫', baseImpact: 2.8,
        biomarkers: [
          { name: 'Liver Enzymes', improvement: 25 },
          { name: 'Sleep Quality', improvement: 10 },
          { name: 'Triglycerides', improvement: 15 }
        ]
      },
      {
        id: 'stop_smoking', label: 'Stop Smoking', icon: '🚭', baseImpact: 4.5,
        biomarkers: [
          { name: 'Lung Function', improvement: 30 },
          { name: 'Blood Pressure', improvement: 15 },
          { name: 'Heart Rate', improvement: 10 }
        ]
      },
      {
        id: 'stress', label: 'Stress Management', icon: '🧘', baseImpact: 2.5,
        biomarkers: [
          { name: 'Cortisol', improvement: 20 },
          { name: 'HRV', improvement: 15 },
          { name: 'Blood Pressure', improvement: 5 }
        ]
      },
      {
        id: 'yoga', label: 'Yoga', icon: '🧘‍♀️', baseImpact: 2.0,
        biomarkers: [
          { name: 'Flexibility', improvement: 25 },
          { name: 'Cortisol', improvement: 10 },
          { name: 'Sleep Quality', improvement: 8 }
        ]
      }
    ];

    const BAND_THRESHOLDS = [
      { max: 39, label: 'Compromised', cls: 'band-compromised', color: '#F87171' },
      { max: 54, label: 'Struggling', cls: 'band-struggling', color: '#FB923C' },
      { max: 69, label: 'Stable', cls: 'band-stable', color: '#FBBF24' },
      { max: 84, label: 'Healthy', cls: 'band-healthy', color: '#71F0FF' },
      { max: 100, label: 'Elite', cls: 'band-elite', color: '#A78BFA' }
    ];

    const MAX_DELTA = 12.0;
    const DIMINISHING_FACTOR = 0.82;

    /* ═══════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════ */

    const state = {
      selectedActions: new Set(),
      targetScore: BASELINE.score,
      estimatedScore: BASELINE.score,
      recommendedPlan: []
    };

    /* ═══════════════════════════════════════════
       RULE ENGINE
       ═══════════════════════════════════════════ */

    function getBand(score) {
      for (const b of BAND_THRESHOLDS) {
        if (score <= b.max) return b;
      }
      return BAND_THRESHOLDS[BAND_THRESHOLDS.length - 1];
    }

    function calculateNewScore(selectedIds) {
      if (selectedIds.size === 0) return BASELINE.score;

      const actions = INTERVENTIONS.filter(a => selectedIds.has(a.id));
      // Sort descending by impact
      actions.sort((a, b) => b.baseImpact - a.baseImpact);

      let totalDelta = 0;
      let factor = 1.0;
      for (const action of actions) {
        totalDelta += action.baseImpact * factor;
        factor *= DIMINISHING_FACTOR;
      }

      // Cap
      totalDelta = Math.min(totalDelta, MAX_DELTA);
      return Math.min(100, Math.round((BASELINE.score + totalDelta) * 10) / 10);
    }

    function getImpactedBiomarkers(selectedIds) {
      const bioMap = {};
      const actions = INTERVENTIONS.filter(a => selectedIds.has(a.id));
      for (const action of actions) {
        for (const bm of action.biomarkers) {
          if (!bioMap[bm.name]) {
            bioMap[bm.name] = { name: bm.name, improvement: 0, sources: [] };
          }
          // Take max improvement for overlapping biomarkers (no double counting)
          bioMap[bm.name].improvement = Math.max(bioMap[bm.name].improvement, bm.improvement);
          bioMap[bm.name].sources.push(action.label);
        }
      }
      return Object.values(bioMap).sort((a, b) => b.improvement - a.improvement);
    }

    function getConfidenceLevel(count) {
      if (count <= 2) return { label: 'High confidence', cls: 'confidence-high' };
      if (count <= 5) return { label: 'Moderate confidence', cls: 'confidence-medium' };
      return { label: 'Lower confidence', cls: 'confidence-low' };
    }

    function recommendActionsForTarget(targetScore) {
      const delta = targetScore - BASELINE.score;
      if (delta <= 0) return [];

      // Greedily pick actions by impact until we reach target
      const sorted = [...INTERVENTIONS].sort((a, b) => b.baseImpact - a.baseImpact);
      const selected = [];
      let accumulated = 0;
      let factor = 1.0;

      for (const action of sorted) {
        if (accumulated >= delta) break;
        const contrib = action.baseImpact * factor;
        accumulated += contrib;
        factor *= DIMINISHING_FACTOR;
        selected.push({ ...action, effectiveImpact: Math.round(contrib * 10) / 10 });
        if (Math.min(accumulated, MAX_DELTA) >= delta) break;
      }

      return selected;
    }

    function getAchievability(targetScore) {
      const delta = targetScore - BASELINE.score;
      if (delta <= 0) return { level: 'achievable', icon: '✅', msg: 'You\'re already at or above this score.' };
      if (delta <= 5) return { level: 'achievable', icon: '✅', msg: 'Achievable with a few focused actions.' };
      if (delta <= 9) return { level: 'stretch', icon: '💪', msg: 'A stretch goal — requires sustained multi-area effort.' };
      if (delta <= MAX_DELTA) return { level: 'difficult', icon: '⚡', msg: 'Ambitious target — maximum combined intervention benefit.' };
      return { level: 'unreachable', icon: '🚧', msg: `Exceeds the estimated max improvement of +${MAX_DELTA}. Consider a closer target first.` };
    }

    const TIME_BANDS = ['2–4 weeks', '4–8 weeks', '8–12 weeks', '3–6 months'];
    function getTimeBand(improvement) {
      if (improvement <= 10) return TIME_BANDS[0];
      if (improvement <= 20) return TIME_BANDS[1];
      if (improvement <= 30) return TIME_BANDS[2];
      return TIME_BANDS[3];
    }

    /* ═══════════════════════════════════════════
       RENDERING
       ═══════════════════════════════════════════ */

    // Score ring
    const CIRCUMFERENCE = 2 * Math.PI * 70; // ≈ 439.82

    function renderScoreRing(score, animate) {
      const ring = document.getElementById('scoreRing');
      const offset = CIRCUMFERENCE * (1 - score / 100);
      if (animate) {
        ring.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
      }
      ring.style.strokeDasharray = CIRCUMFERENCE;
      ring.style.strokeDashoffset = offset;
    }

    function animateNumber(el, from, to, duration = 800) {
      const start = performance.now();
      const diff = to - from;
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const current = from + diff * eased;
        el.textContent = current.toFixed(1);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function renderMainScore() {
      const score = BASELINE.score;
      const band = getBand(score);
      const numEl = document.getElementById('mainScoreNum');
      animateNumber(numEl, 0, score, 1200);
      renderScoreRing(score, true);

      const badge = document.getElementById('mainBandBadge');
      badge.textContent = band.label;
      badge.className = 'score-band-badge ' + band.cls;

      const d = new Date(BASELINE.lastUpdated);
      document.getElementById('lastUpdated').textContent =
        'Last updated: ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
        ' at ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function getNextTier(score) {
      const idx = BAND_THRESHOLDS.findIndex(b => score <= b.max);
      if (idx >= 0 && idx < BAND_THRESHOLDS.length - 1) {
        return { ...BAND_THRESHOLDS[idx + 1], targetScore: BAND_THRESHOLDS[idx].max + 1 };
      }
      return null;
    }

    function renderContributors() {
      const container = document.getElementById('contributorsContainer');
      const score = BASELINE.score;
      const band = getBand(score);
      const nextTier = getNextTier(score);
      const neg = BASELINE.contributors.negative;
      const pos = BASELINE.contributors.positive;
      const totalPotential = neg.reduce((s, c) => s + (c.potentialPoints || 0), 0);
      const topLimiter = neg[0];
      const isCapped = BASELINE.uncappedScore != null && BASELINE.cappingFactor;
      const limNames = neg.map(c => c.metric).join(' · ');
      const helpNames = pos.map(c => c.metric).join(' · ');
      const bodyText = isCapped
        ? `${BASELINE.cappingFactor} is limiting your score. Your underlying metrics add up to ${Math.round(BASELINE.uncappedScore)}, but the score can't go above ${Math.round(score)}.`
        : `${topLimiter.metric} is limiting your score. Improving it could add ~${topLimiter.potentialPoints || 0} points.`;

      let html = '<div class="why-grid">';

      // Hero card - Why X? (full width)
      html += `<div class="why-card why-hero why-card-span why-delay-1">
    <div class="why-hero-title">What Your Baseline Score Means To You</div>
    <div class="why-hero-body">Your Baseline Score is ${Math.round(score)}/100, which means some systems are working well, while others are lagging. Your body is functioning, but overall stability and resilience are still developing.</div>
    <div class="why-hero-meta">${neg.length} area${neg.length > 1 ? 's' : ''} to improve · ~${Math.round(totalPotential)} points potential</div>
    <div class="why-hero-tags">
      <span class="tag-lim"><strong>Limiting:</strong> ${limNames}</span>
      <span class="tag-help"><strong>Helping:</strong> ${helpNames}</span>
    </div>
  </div>`;

      // Left column: Areas to Improve / Negative Impact Markers
      html += '<div class="why-card why-delay-2">';
      html += '<div class="why-list-title limiting">Areas to Improve</div>';
      html += '<div class="why-list-subtitle">Negative Impact Markers</div>';
      for (const c of neg) {
        html += `<div class="why-marker-line negative">${c.id} - ${c.metric} - ${c.value} ${c.unit} - <span class="marker-status">${c.status}</span></div>`;
      }
      html += '</div>';

      // Right column: What's Working Well / Positive Impact Markers
      html += '<div class="why-card why-delay-3">';
      html += '<div class="why-list-title helping">What\'s Working Well</div>';
      html += '<div class="why-list-subtitle">Positive Impact Markers</div>';
      for (const c of pos) {
        html += `<div class="why-marker-line positive">${c.id} - ${c.metric} - ${c.value} ${c.unit} - <span class="marker-status">${c.status}</span></div>`;
      }
      html += '</div>';





      html += '</div>';

      container.innerHTML = html;

      // Animate breakdown bars with delay
      requestAnimationFrame(() => {
        setTimeout(() => {
          container.querySelectorAll('.breakdown-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width || '0';
          });
        }, 600);
      });
    }

    function renderInterventionChips() {
      const grid = document.getElementById('interventionsGrid');
      let html = '';
      for (const action of INTERVENTIONS) {
        const isActive = state.selectedActions.has(action.id);
        html += `
      <div class="intervention-chip ${isActive ? 'active' : ''}"
           data-id="${action.id}"
           tabindex="0"
           role="switch"
           aria-checked="${isActive}"
           onclick="toggleAction('${action.id}')"
           onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleAction('${action.id}');}">
        <span class="chip-icon">${action.icon}</span>
        <span class="chip-label">${action.label}</span>
        <div class="chip-toggle">
          <input type="checkbox" ${isActive ? 'checked' : ''} tabindex="-1" aria-hidden="true">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </div>
      </div>`;
      }
      grid.innerHTML = html;
    }

    function renderEstimatedScore() {
      const score = state.estimatedScore;
      const delta = Math.round((score - BASELINE.score) * 10) / 10;
      const band = getBand(score);

      document.getElementById('estCurrent').textContent = BASELINE.score.toFixed(1);

      const newEl = document.getElementById('estNew');
      const currentVal = parseFloat(newEl.textContent) || BASELINE.score;
      animateNumber(newEl, currentVal, score, 500);

      const deltaEl = document.getElementById('estDelta');
      if (delta > 0) {
        deltaEl.textContent = '+' + delta.toFixed(1);
        deltaEl.className = 'est-delta';
      } else {
        deltaEl.textContent = '+0.0';
        deltaEl.className = 'est-delta zero';
      }

      const bandEl = document.getElementById('estBand');
      bandEl.textContent = band.label;
      bandEl.style.color = band.color;
    }

    function renderBiomarkers() {
      const list = document.getElementById('biomarkerList');
      const bms = getImpactedBiomarkers(state.selectedActions);

      if (bms.length === 0) {
        list.innerHTML = '<li class="biomarker-item" style="color:var(--text-muted); font-size:12px;">Toggle actions above to see impacted biomarkers</li>';
        return;
      }

      let html = '';
      for (const bm of bms) {
        html += `
      <li class="biomarker-item">
        <span class="biomarker-dot positive"></span>
        <span class="biomarker-name">${bm.name}</span>
        <span class="biomarker-change positive">+${bm.improvement}%</span>
      </li>`;
      }
      list.innerHTML = html;
    }

    function renderConfidence() {
      const container = document.getElementById('confidenceBadgeContainer');
      const count = state.selectedActions.size;
      if (count === 0) {
        container.innerHTML = '';
        return;
      }
      const conf = getConfidenceLevel(count);
      container.innerHTML = `
    <div class="confidence-badge ${conf.cls}" title="Based on ${count} combined action(s)">
      <span class="confidence-dot"></span>
      ${conf.label} · ${count} action${count > 1 ? 's' : ''}
    </div>`;
    }

    function renderTargetTab() {
      const target = state.targetScore;
      const band = getBand(target);
      const achieve = getAchievability(target);
      const delta = target - BASELINE.score;

      document.getElementById('targetBigNum').textContent = target.toFixed(1);

      const bandLabel = document.getElementById('targetBandLabel');
      bandLabel.textContent = band.label;
      bandLabel.style.color = band.color;

      // Achievability
      const achBox = document.getElementById('achievabilityBox');
      if (delta > 0) {
        achBox.style.display = 'flex';
        achBox.className = 'achievability-box ' + achieve.level;
        achBox.innerHTML = `<span class="achievability-icon">${achieve.icon}</span><span>${achieve.msg}</span>`;
      } else {
        achBox.style.display = 'none';
      }

      // Recommended plan
      const planContainer = document.getElementById('actionPlan');
      const planList = document.getElementById('planActionsList');
      const recommended = recommendActionsForTarget(target);
      state.recommendedPlan = recommended;

      if (delta > 0 && recommended.length > 0) {
        planContainer.style.display = 'block';
        let html = '';
        for (const action of recommended) {
          html += `
        <div class="plan-action-item">
          <span class="plan-action-icon">${action.icon}</span>
          <div class="plan-action-info">
            <div class="plan-action-name">${action.label}</div>
            <div class="plan-action-impact">+${action.effectiveImpact} score points</div>
          </div>
          <span class="plan-action-check">✓</span>
        </div>`;
        }
        planList.innerHTML = html;
      } else {
        planContainer.style.display = 'none';
      }

      // Biomarker improvements
      const bioimpContainer = document.getElementById('biomarkerImprovements');
      const bioimpList = document.getElementById('bioimpList');

      if (delta > 0 && recommended.length > 0) {
        const recIds = new Set(recommended.map(a => a.id));
        const bms = getImpactedBiomarkers(recIds);
        if (bms.length > 0) {
          bioimpContainer.style.display = 'block';
          let html = '';
          for (const bm of bms) {
            const currentRank = 'Current';
            const targetRank = 'Improved';
            html += `
          <div class="bioimp-item">
            <span class="bioimp-name">${bm.name}</span>
            <span class="bioimp-current">${currentRank}</span>
            <span class="bioimp-arrow">→</span>
            <span class="bioimp-target">${targetRank}</span>
            <span class="bioimp-time">${getTimeBand(bm.improvement)}</span>
          </div>`;
          }
          bioimpList.innerHTML = html;
        } else {
          bioimpContainer.style.display = 'none';
        }
      } else {
        bioimpContainer.style.display = 'none';
      }

      // Apply button
      document.getElementById('applyPlanBtn').disabled = delta <= 0 || recommended.length === 0;
    }

    function renderDebug() {
      // Debug drawer removed
    }

    /* ═══════════════════════════════════════════
       EVENT HANDLERS
       ═══════════════════════════════════════════ */

    function toggleAction(id) {
      if (state.selectedActions.has(id)) {
        state.selectedActions.delete(id);
      } else {
        state.selectedActions.add(id);
      }
      state.estimatedScore = calculateNewScore(state.selectedActions);
      renderInterventionChips();
      renderEstimatedScore();
      renderBiomarkers();
      renderConfidence();
      renderDebug();
    }

    function resetAll() {
      state.selectedActions.clear();
      state.estimatedScore = BASELINE.score;
      renderInterventionChips();
      renderEstimatedScore();
      renderBiomarkers();
      renderConfidence();
      renderDebug();
      showToast('All actions reset');
    }

    function scrollToEl(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function switchTab(tabName) {
      if (tabName === 'intervention') {
        window.location.href = 'improve.html';
        return;
      }
      if (tabName === 'score') {
        window.location.href = 'target.html';
        return;
      }
      // Home: update active tab button
      document.querySelectorAll('.mobile-nav-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById('score-card').style.display = 'block';
    }

    /* ═══════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════ */

    function init() {
      renderMainScore();
      renderContributors();
    }

    // Run on DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>

</html>

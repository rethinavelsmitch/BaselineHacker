<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseline Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Deep Holistics Design System ─── */
    :root {
      --bg-black: #040404;
      --bg-card: #0C0C0C;
      --bg-elevated: #121212;
      --red-violet: #CA0F88;
      --electric-blue: #4900FF;
      --royal-purple: #5C05A5;
      --neon-mint: #71F0FF;
      --off-white: #F1F3F6;
      --text-primary: #F1F3F6;
      --text-secondary: rgba(241, 243, 246, 0.75);
      --text-muted: rgba(241, 243, 246, 0.5);
      --border-subtle: rgba(241, 243, 246, 0.08);
      --border-default: rgba(241, 243, 246, 0.12);
      --gradient-main: linear-gradient(135deg, #CA0F88 0%, #5C05A5 50%, #4900FF 100%);
      --gradient-accent: linear-gradient(135deg, #4900FF 0%, #5C05A5 100%);
      --gradient-ring: conic-gradient(from 0deg, #CA0F88, #5C05A5, #4900FF, #71F0FF);
      --gradient-card: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(92, 5, 165, 0.15) 0%, transparent 70%);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 24px rgba(202, 15, 136, 0.25);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms ease;
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-sans);
      font-weight: 400;
      background: var(--bg-black);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Layout ─── */
    .app-container {
      max-width: none !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 24px 24px 32px;
      box-sizing: border-box;
    }



    /* ─── Section Card ─── */
    .card {
      background: linear-gradient(135deg, rgba(12, 12, 12, 0.8) 0%, rgba(18, 18, 18, 0.6) 100%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-top: 0;
      overflow: hidden;
      width: 100%;
      max-width: none;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: var(--gradient-card);
      pointer-events: none;
    }

    .card-header {
      padding: 16px 20px 0;
    }

    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    /* ─── Score Ring ─── */
    .score-card-top {
      background: 
        radial-gradient(circle at 20% 50%, rgba(202, 15, 136, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(73, 0, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% 0%, rgba(92, 5, 165, 0.3) 0%, rgba(202, 15, 136, 0.2) 30%, transparent 70%);
      padding: 40px 20px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .score-card-top::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="none"><defs><linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgba(113,240,255,0.08);stop-opacity:1" /><stop offset="100%" style="stop-color:rgba(202,15,136,0.04);stop-opacity:1" /></linearGradient></defs><g opacity="0.6"><circle cx="350" cy="30" r="25" fill="none" stroke="rgba(113,240,255,0.15)" stroke-width="1.5"/><circle cx="350" cy="30" r="35" fill="none" stroke="rgba(113,240,255,0.08)" stroke-width="1"/><circle cx="380" cy="60" r="20" fill="none" stroke="rgba(202,15,136,0.12)" stroke-width="1.5"/><circle cx="360" cy="80" r="15" fill="none" stroke="rgba(113,240,255,0.1)" stroke-width="1"/><line x1="350" y1="30" x2="380" y2="60" stroke="rgba(113,240,255,0.1)" stroke-width="1"/><line x1="380" y1="60" x2="360" y2="80" stroke="rgba(202,15,136,0.08)" stroke-width="1"/><line x1="350" y1="30" x2="360" y2="80" stroke="rgba(113,240,255,0.08)" stroke-width="0.8"/><circle cx="350" cy="30" r="3" fill="rgba(113,240,255,0.3)"/><circle cx="380" cy="60" r="2.5" fill="rgba(202,15,136,0.25)"/><circle cx="360" cy="80" r="2" fill="rgba(113,240,255,0.2)"/><path d="M 320 20 Q 330 40 340 60 Q 350 80 360 100" fill="none" stroke="rgba(113,240,255,0.12)" stroke-width="1.5" stroke-dasharray="3,2"/><path d="M 340 10 Q 350 35 360 60 Q 370 85 380 110" fill="none" stroke="rgba(202,15,136,0.1)" stroke-width="1" stroke-dasharray="2,2"/><circle cx="320" cy="20" r="2" fill="rgba(113,240,255,0.25)"/><circle cx="340" cy="60" r="1.5" fill="rgba(202,15,136,0.2)"/><circle cx="360" cy="100" r="2" fill="rgba(113,240,255,0.15)"/><text x="310" y="45" font-size="11" fill="rgba(113,240,255,0.15)" font-family="monospace" font-weight="bold">92.5</text><text x="370" y="35" font-size="10" fill="rgba(202,15,136,0.12)" font-family="monospace">78</text><text x="355" y="110" font-size="9" fill="rgba(113,240,255,0.12)" font-family="monospace">64.3</text><text x="330" y="75" font-size="10" fill="rgba(202,15,136,0.1)" font-family="monospace">88</text><text x="385" y="90" font-size="9" fill="rgba(113,240,255,0.11)" font-family="monospace">71.2</text></g></svg>'),
        radial-gradient(circle at 50% 0%, rgba(92, 5, 165, 0.3) 0%, rgba(202, 15, 136, 0.2) 30%, transparent 70%);
      background-size: 100% 100%, 100% 100%;
      background-position: right top, 0 0;
      background-repeat: no-repeat, no-repeat;
      animation: scoreGlow 4s ease-in-out infinite;
      pointer-events: none;
    }

    .score-card-top::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 200px;
      height: 150px;
      background-image: 
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" preserveAspectRatio="xMaxYMax slice"><defs><linearGradient id="bioGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgba(202,15,136,0.06);stop-opacity:1" /><stop offset="100%" style="stop-color:rgba(113,240,255,0.08);stop-opacity:1" /></linearGradient></defs><g opacity="0.5"><circle cx="150" cy="120" r="30" fill="none" stroke="rgba(202,15,136,0.12)" stroke-width="1.5"/><circle cx="150" cy="120" r="45" fill="none" stroke="rgba(113,240,255,0.08)" stroke-width="1"/><circle cx="180" cy="100" r="22" fill="none" stroke="rgba(113,240,255,0.1)" stroke-width="1.5"/><circle cx="130" cy="90" r="18" fill="none" stroke="rgba(202,15,136,0.1)" stroke-width="1"/><line x1="150" y1="120" x2="180" y2="100" stroke="rgba(202,15,136,0.09)" stroke-width="1"/><line x1="180" y1="100" x2="130" y2="90" stroke="rgba(113,240,255,0.08)" stroke-width="1"/><line x1="150" y1="120" x2="130" y2="90" stroke="rgba(202,15,136,0.07)" stroke-width="0.8"/><circle cx="150" cy="120" r="3" fill="rgba(202,15,136,0.25)"/><circle cx="180" cy="100" r="2.5" fill="rgba(113,240,255,0.2)"/><circle cx="130" cy="90" r="2" fill="rgba(202,15,136,0.2)"/><path d="M 160 140 Q 170 120 180 100 Q 190 80 200 60" fill="none" stroke="rgba(202,15,136,0.1)" stroke-width="1.5" stroke-dasharray="3,2"/><path d="M 140 150 Q 155 125 170 100 Q 185 75 200 50" fill="none" stroke="rgba(113,240,255,0.08)" stroke-width="1" stroke-dasharray="2,2"/><text x="140" y="75" font-size="10" fill="rgba(202,15,136,0.13)" font-family="monospace" font-weight="bold">85.6</text><text x="165" y="115" font-size="9" fill="rgba(113,240,255,0.12)" font-family="monospace">69</text><text x="125" y="110" font-size="10" fill="rgba(202,15,136,0.11)" font-family="monospace">73.4</text><text x="175" y="75" font-size="9" fill="rgba(113,240,255,0.1)" font-family="monospace">91</text><text x="145" y="135" font-size="9" fill="rgba(202,15,136,0.1)" font-family="monospace">58.2</text></g></svg>');
      background-size: 100% 100%;
      background-position: right bottom;
      background-repeat: no-repeat;
      pointer-events: none;
      opacity: 0.7;
      animation: bioFloat 6s ease-in-out infinite;
    }

    @keyframes bioFloat {
      0%, 100% { opacity: 0.7; transform: translateY(0px); }
      50% { opacity: 0.9; transform: translateY(-8px); }
    }

    @keyframes scoreGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .score-radial-wrapper {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 20px;
    }

    .score-dots-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .score-center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      background: var(--bg-black);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(202, 15, 136, 0.1);
      animation: centerPulse 3s ease-in-out infinite;
    }

    @keyframes centerPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(202, 15, 136, 0.1); }
      50% { box-shadow: 0 0 50px rgba(202, 15, 136, 0.2), inset 0 0 30px rgba(202, 15, 136, 0.15); }
    }

    .score-number {
      font-size: 56px;
      font-weight: 600;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--off-white);
    }

    .score-of {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 6px;
    }

    .score-icon-badge {
      display: none;
    }

    .band-compromised {
      background: transparent;
      color: #F87171;
      border: none;
    }

    .band-struggling {
      background: transparent;
      color: #FB923C;
      border: none;
    }

    .band-stable {
      background: transparent;
      color: #FBBF24;
      border: none;
    }

    .band-healthy {
      background: transparent;
      color: var(--neon-mint);
      border: none;
    }

    .band-elite {
      background: transparent;
      color: #A78BFA;
      border: none;
    }

    .last-updated {
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
      z-index: 2;
    }

    /* ─── Why This Score ─── */
    .why-score {
      padding: 24px;
      --why-stagger: 80ms;
      background: linear-gradient(135deg, rgba(92, 5, 165, 0.1) 0%, rgba(73, 0, 255, 0.05) 100%);
      position: relative;
    }

    .why-score::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 0%, rgba(202, 15, 136, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .why-score h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    /* Grid layout */
    .why-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 768px) {
      .why-grid {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      .why-grid .why-card-span {
        grid-column: 1 / -1;
      }
    }

    @media (min-width: 1024px) {
      .why-grid {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }
    }

    @media (max-width: 1023px) {
      .why-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    @media (max-width: 767px) {
      .why-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }

    /* Animated cards */
    .why-card {
      background: linear-gradient(135deg, rgba(12, 12, 12, 0.8) 0%, rgba(18, 18, 18, 0.6) 100%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: whyCardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .why-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(202, 15, 136, 0.05) 0%, rgba(73, 0, 255, 0.02) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .why-card:hover::before {
      opacity: 1;
    }

    @media (max-width: 767px) {
      .why-card {
        padding: 16px 16px;
        animation: whyCardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
    }

    .why-card.collapsible {
      cursor: pointer;
    }

    .why-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .why-card-title-section {
      flex: 1;
    }

    .why-card-toggle-icon {
      font-size: 20px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
      margin-top: 2px;
      display: none;
      color: var(--neon-mint);
      animation: togglePulse 2s ease-in-out infinite;
    }

    @keyframes togglePulse {
      0%, 100% { opacity: 0.7; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    .why-card.collapsed .why-card-toggle-icon {
      transform: rotate(-90deg);
      animation: none;
    }

    .why-card-content {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, margin-top 0.4s ease;
      opacity: 1;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .why-card.collapsed .why-card-content {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    /* Mobile-only expandable behavior */
    @media (max-width: 767px) {
      .why-card-toggle-icon {
        display: block;
      }

      .why-card.collapsible {
        cursor: pointer;
      }

      .why-card.collapsed .why-card-content {
        max-height: 0;
        opacity: 0;
        margin-top: 0;
      }

      .why-card.collapsed .why-card-toggle-icon {
        transform: rotate(-90deg);
      }
    }

    /* Desktop: always expanded, no collapse */
    @media (min-width: 768px) {
      .why-card.collapsible {
        cursor: default;
      }

      .why-card.collapsible.collapsed {
        cursor: default;
      }

      .why-card.collapsible.collapsed .why-card-content {
        max-height: 1000px;
        opacity: 1;
        margin-top: 12px;
      }

      .why-card-toggle-icon {
        display: none;
      }
    }

    .why-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(202, 15, 136, 0.5), transparent);
      opacity: 0;
      animation: shimmer 2.5s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .why-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(202, 15, 136, 0.15);
      border-color: rgba(202, 15, 136, 0.35);
    }

    .why-card.why-delay-1 {
      animation-delay: 0.1s;
    }

    .why-card.why-delay-2 {
      animation-delay: 0.25s;
    }

    .why-card.why-delay-3 {
      animation-delay: 0.4s;
    }

    @media (max-width: 767px) {
      .why-card.why-delay-1 {
        animation-delay: 0.1s;
      }

      .why-card.why-delay-2 {
        animation-delay: 0.35s;
      }

      .why-card.why-delay-3 {
        animation-delay: 0.6s;
      }
    }

    @keyframes whyCardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes whyItemIn {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 767px) {
      @keyframes whyCardIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }

    /* Hero card - Why X? */
    .why-hero {
      background: linear-gradient(135deg, rgba(92, 5, 165, 0.25) 0%, rgba(73, 0, 255, 0.15) 100%);
      border: 1.5px solid rgba(202, 15, 136, 0.4);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .why-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-main);
      animation: heroGlow 3s ease-in-out infinite;
    }

    @keyframes heroGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .why-hero-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    .why-hero-title .score-val {
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 24px;
    }

    .why-hero-body {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .why-hero-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .why-hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .why-hero-tags .tag-lim {
      color: #F87171;
      font-weight: 600;
    }

    .why-hero-tags .tag-help {
      color: var(--neon-mint);
      font-weight: 600;
    }

    /* Limiters & helpers lists */
    .why-list-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-primary);
      text-transform: none;
      letter-spacing: 0.3px;
    }

    @media (max-width: 767px) {
      .why-list-title {
        font-size: 12px;
        margin-bottom: 8px;
        letter-spacing: 0.2px;
      }
    }

    .why-list-title.limiting {
      color: #F87171;
    }

    .why-list-title.helping {
      color: var(--neon-mint);
    }

    .why-list-subtitle {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      margin-top: 2px;
      margin-bottom: 10px;
    }

    @media (max-width: 767px) {
      .why-list-subtitle {
        font-size: 9px;
        margin-bottom: 8px;
        letter-spacing: 0.4px;
      }
    }

    .why-notes-eg {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .why-marker-line {
      font-size: 12px;
      font-weight: 500;

    .trend-chart {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .trend-svg {
      width: 100%;
      height: auto;
      min-height: 140px;
    }

    .trend-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin: 4px 0 0 0;

    .trend-svg {
      width: 100%;
      height: auto;
      min-height: 160px;
      margin-bottom: 12px;

    .trend-point {
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 4px rgba(113, 240, 255, 0.3));

    }

    @keyframes pulseCurrent {
      0%, 100% { r: 5; opacity: 0.8; filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.4)); }
      50% { r: 7; opacity: 1; filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.8)); }

      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .why-list-item .info-icon {
      flex-shrink: 0;
      opacity: 0.6;
      font-size: 11px;
    }

    .breakdown-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
      color: var(--text-secondary);
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      opacity: 0;
      animation: whyItemIn 0.5s ease forwards;
    }

    .breakdown-row:nth-child(2) {
      animation-delay: 0.1s;
    }

    .breakdown-row:nth-child(3) {
      animation-delay: 0.2s;
    }

    .breakdown-row:nth-child(4) {
      animation-delay: 0.3s;
    }

    .breakdown-row:last-child {
      margin-bottom: 0;
    }

    .breakdown-label {
      font-size: 13px;
      color: var(--text-primary);
      min-width: 0;
      flex: 1;
    }

    .breakdown-bar-track {
      flex: 0 0 100px;
      height: 10px;
      background: var(--bg-black);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .breakdown-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--gradient-main);
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0;
    }

    .breakdown-pct {
      font-size: 12px;
      font-weight: 600;
      min-width: 38px;
      text-align: right;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .why-tooltip {

      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 6px;
      padding: 10px 12px;
      background: var(--bg-black);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      z-index: 50;
      display: none;
      box-shadow: var(--shadow-lg);
    }

    }

    .cta-chips {

      gap: 8px;
      padding: 0 20px 20px;
      flex-wrap: wrap;

      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      background: var(--bg-elevated);
      color: var(--neon-mint);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;

      color: var(--off-white);
      border-color: transparent;
      box-shadow: var(--shadow-glow);
    }

    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);

      to {
        opacity: 1;
        transform: translateY(0);
      }

      animation: slideUp 0.5s ease both;

    .animate-in:nth-child(1) {
      animation-delay: 0.05s;
    }

    .animate-in:nth-child(2) {
      animation-delay: 0.1s;
    }

    .animate-in:nth-child(3) {
      animation-delay: 0.15s;
    }

    .animate-in:nth-child(4) {
      animation-delay: 0.2s;

      white-space: nowrap;

    .toast.show {

      transform: translateX(-50%) translateY(0);

    .mobile-nav {

    }

    .mobile-nav::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .mobile-nav-tabs {
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 38px;
      width: 100%;
      padding: 0 4px;
    }

    .mobile-nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 4px 8px;
      cursor: pointer;

    }

    }

    }

    /* ═══════════════════════════════════════════
       RULE ENGINE
       ═══════════════════════════════════════════ */

    function getBand(score) {
      for (const b of BAND_THRESHOLDS) {
        if (score <= b.max) return b;
      }
      return BAND_THRESHOLDS[BAND_THRESHOLDS.length - 1];
    }

    function calculateNewScore(selectedIds) {
      if (selectedIds.size === 0) return BASELINE.score;

      const actions = INTERVENTIONS.filter(a => selectedIds.has(a.id));
      // Sort descending by impact
      actions.sort((a, b) => b.baseImpact - a.baseImpact);

      let totalDelta = 0;
      let factor = 1.0;
      for (const action of actions) {
        totalDelta += action.baseImpact * factor;
        factor *= DIMINISHING_FACTOR;
      }

      // Cap
      totalDelta = Math.min(totalDelta, MAX_DELTA);
      return Math.min(100, Math.round((BASELINE.score + totalDelta) * 10) / 10);
    }

    function getImpactedBiomarkers(selectedIds) {
      const bioMap = {};
      const actions = INTERVENTIONS.filter(a => selectedIds.has(a.id));
      for (const action of actions) {
        for (const bm of action.biomarkers) {
          if (!bioMap[bm.name]) {
            bioMap[bm.name] = { name: bm.name, improvement: 0, sources: [] };
          }
          // Take max improvement for overlapping biomarkers (no double counting)
          bioMap[bm.name].improvement = Math.max(bioMap[bm.name].improvement, bm.improvement);
          bioMap[bm.name].sources.push(action.label);
        }
      }
      return Object.values(bioMap).sort((a, b) => b.improvement - a.improvement);
    }

    function getConfidenceLevel(count) {
      if (count <= 2) return { label: 'High confidence', cls: 'confidence-high' };
      if (count <= 5) return { label: 'Moderate confidence', cls: 'confidence-medium' };
      return { label: 'Lower confidence', cls: 'confidence-low' };
    }

    function recommendActionsForTarget(targetScore) {
      const delta = targetScore - BASELINE.score;
      if (delta <= 0) return [];

      // Greedily pick actions by impact until we reach target
      const sorted = [...INTERVENTIONS].sort((a, b) => b.baseImpact - a.baseImpact);
      const selected = [];
      let accumulated = 0;
      let factor = 1.0;

      for (const action of sorted) {
        if (accumulated >= delta) break;
        const contrib = action.baseImpact * factor;
        accumulated += contrib;
        factor *= DIMINISHING_FACTOR;
        selected.push({ ...action, effectiveImpact: Math.round(contrib * 10) / 10 });
        if (Math.min(accumulated, MAX_DELTA) >= delta) break;
      }

      return selected;
    }

    function getAchievability(targetScore) {
      const delta = targetScore - BASELINE.score;
      if (delta <= 0) return { level: 'achievable', icon: '✅', msg: 'You\'re already at or above this score.' };
      if (delta <= 5) return { level: 'achievable', icon: '✅', msg: 'Achievable with a few focused actions.' };
      if (delta <= 9) return { level: 'stretch', icon: '💪', msg: 'A stretch goal — requires sustained multi-area effort.' };
      if (delta <= MAX_DELTA) return { level: 'difficult', icon: '⚡', msg: 'Ambitious target — maximum combined intervention benefit.' };
      return { level: 'unreachable', icon: '🚧', msg: `Exceeds the estimated max improvement of +${MAX_DELTA}. Consider a closer target first.` };
    }

    const TIME_BANDS = ['2–4 weeks', '4–8 weeks', '8–12 weeks', '3–6 months'];
    function getTimeBand(improvement) {
      if (improvement <= 10) return TIME_BANDS[0];
      if (improvement <= 20) return TIME_BANDS[1];
      if (improvement <= 30) return TIME_BANDS[2];
      return TIME_BANDS[3];
    }

    /* ═══════════════════════════════════════════
       RENDERING
       ═══════════════════════════════════════════ */

    function animateNumber(el, from, to, duration = 800) {
      const start = performance.now();
      const diff = to - from;
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        const current = from + diff * eased;
        el.textContent = current.toFixed(1);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function renderScoreDots(score, animate) {
      const canvas = document.getElementById('scoreDotsCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const innerRadius = 75;
      const outerRadius = 125;
      
      const rings = 8;
      const dotsPerRing = [24, 28, 32, 36, 40, 44, 48, 52];
      const filledPercent = score / 100;
      let animationTime = 0;
      
      function drawDots(progress, time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let ring = 0; ring < rings; ring++) {
          const radius = innerRadius + (outerRadius - innerRadius) * (ring / (rings - 1));
          const numDots = dotsPerRing[ring];
          const dotSize = 3 - (ring * 0.2);
          const baseOpacity = 0.15 + (0.15 * (1 - ring / rings));
          
          for (let i = 0; i < numDots; i++) {
            const angle = (i / numDots) * Math.PI * 2 - Math.PI / 2;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            const dotProgress = i / numDots;
            const isFilled = dotProgress <= filledPercent * progress;
            
            // Animation: pulse and glow effect
            const pulseTime = (time * 0.003 + i * 0.05) % (Math.PI * 2);
            const pulseScale = 1 + Math.sin(pulseTime) * 0.3;
            const animatedDotSize = dotSize * pulseScale;
            
            if (isFilled) {
              const glowOpacity = 0.3 + Math.sin(pulseTime) * 0.2;
              
              // Glow effect
              const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, animatedDotSize * 3);
              glowGradient.addColorStop(0, `rgba(202, 15, 136, ${glowOpacity})`);
              glowGradient.addColorStop(1, `rgba(202, 15, 136, 0)`);
              ctx.fillStyle = glowGradient;
              ctx.beginPath();
              ctx.arc(x, y, animatedDotSize * 3, 0, Math.PI * 2);
              ctx.fill();
              
              // Main dot with gradient
              const gradient = ctx.createRadialGradient(x, y, 0, x, y, animatedDotSize + 2);
              gradient.addColorStop(0, `rgba(202, 15, 136, ${0.9 - ring * 0.08})`);
              gradient.addColorStop(0.5, `rgba(92, 5, 165, ${0.7 - ring * 0.06})`);
              gradient.addColorStop(1, `rgba(73, 0, 255, ${0.5 - ring * 0.04})`);
              ctx.fillStyle = gradient;
            } else {
              ctx.fillStyle = `rgba(241, 243, 246, ${baseOpacity})`;
            }
            
            ctx.beginPath();
            ctx.arc(x, y, animatedDotSize, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      
      if (animate) {
        let startTime = null;
        const duration = 1200;
        
        function animateDots(timestamp) {
          if (!startTime) startTime = timestamp;
          const elapsed = timestamp - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          
          animationTime = timestamp;
          drawDots(eased, animationTime);
          
          if (progress < 1) {
            requestAnimationFrame(animateDots);
          } else {
            // Continue animation loop after initial animation
            function continuousAnimation(timestamp) {
              drawDots(1, timestamp);
              requestAnimationFrame(continuousAnimation);
            }
            requestAnimationFrame(continuousAnimation);
          }
        }
        requestAnimationFrame(animateDots);
      } else {
        drawDots(1, 0);
      }
    }

    function renderMainScore() {
      const score = BASELINE.score;
      const band = getBand(score);
      const numEl = document.getElementById('mainScoreNum');
      animateNumber(numEl, 0, score, 1200);
      renderScoreDots(score, true);

      const badge = document.getElementById('mainBandBadge');
      badge.textContent = band.label;
      badge.className = 'score-band-badge ' + band.cls;

      const d = new Date(BASELINE.lastUpdated);
      document.getElementById('lastUpdated').textContent =
        'Last updated: ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
        ' at ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function getNextTier(score) {
      const idx = BAND_THRESHOLDS.findIndex(b => score <= b.max);
      if (idx >= 0 && idx < BAND_THRESHOLDS.length - 1) {
        return { ...BAND_THRESHOLDS[idx + 1], targetScore: BAND_THRESHOLDS[idx].max + 1 };
      }
      return null;
    }

    function renderContributors() {
      const container = document.getElementById('contributorsContainer');
      const score = BASELINE.score;
      const band = getBand(score);
      const nextTier = getNextTier(score);
      const neg = BASELINE.contributors.negative;
      const pos = BASELINE.contributors.positive;
      const ext = BASELINE.contributors.external;
      const totalPotential = neg.reduce((s, c) => s + (c.potentialPoints || 0), 0);
      const topLimiter = neg[0];
      const isCapped = BASELINE.uncappedScore != null && BASELINE.cappingFactor;
      const limNames = neg.map(c => c.metric).join(' · ');
      const helpNames = pos.map(c => c.metric).join(' · ');

      let html = '<div class="why-grid">';

      // Right column: What's Working Well (FIRST) - EXPANDABLE
      html += '<div class="why-card why-delay-1 collapsible collapsed" data-card="positive">';
      html += '<div class="why-card-header">';
      html += '<div class="why-card-title-section">';
      html += '<div class="why-list-title helping">✨ What\'s Working Well</div>';
      html += '<div class="why-list-subtitle">Positive Biomarkers Supporting Your Health</div>';
      html += '</div>';
      html += '<div class="why-card-toggle-icon">▼</div>';
      html += '</div>';
      html += '<div class="why-card-content">';
      for (const c of pos) {
        html += `<div class="biomarker-detail-item">
          <div class="biomarker-left">
            <div class="biomarker-header">
              <span class="biomarker-name">${c.metric}</span>
              <span class="biomarker-status positive">${c.status}</span>
            </div>
            <div class="biomarker-value-row">
              <span class="biomarker-value">${c.value}</span>
              <span class="biomarker-unit">${c.unit}</span>
            </div>
          </div>
        </div>`;
      }
      html += '</div>';
      html += '</div>';

      // Left column: Areas Needing Attention (SECOND) - EXPANDABLE
      html += '<div class="why-card why-delay-2 collapsible collapsed" data-card="negative">';
      html += '<div class="why-card-header">';
      html += '<div class="why-card-title-section">';
      html += '<div class="why-list-title limiting">⚠️ Areas Needing Attention</div>';
      html += '<div class="why-list-subtitle">Negative Key Biomarkers Impacting Your Score</div>';
      html += '</div>';
      html += '<div class="why-card-toggle-icon">▼</div>';
      html += '</div>';
      html += '<div class="why-card-content">';
      for (const c of neg) {
        html += `<div class="biomarker-detail-item">
          <div class="biomarker-left">
            <div class="biomarker-header">
              <span class="biomarker-name">${c.metric}</span>
              <span class="biomarker-status negative">${c.status}</span>
            </div>
            <div class="biomarker-value-row">
              <span class="biomarker-value">${c.value}</span>
              <span class="biomarker-unit">${c.unit}</span>
            </div>
          </div>
        </div>`;
      }
      html += '</div>';
      html += '</div>';

      // Third column: External Influencers (THIRD) - EXPANDABLE
      html += '<div class="why-card why-delay-3 collapsible collapsed" data-card="external">';
      html += '<div class="why-card-header">';
      html += '<div class="why-card-title-section">';
      html += '<div class="why-list-title" style="color: #71F0FF;">🔬 External Influencers</div>';
      html += '<div class="why-list-subtitle">Medications & Supplements Affecting Your Markers</div>';
      html += '</div>';
      html += '<div class="why-card-toggle-icon">▼</div>';
      html += '</div>';
      html += '<div class="why-card-content">';
      for (const e of ext) {
        const typeClass = e.type.toLowerCase();
        html += `<div class="external-influencers-item">
          <div class="external-icon">${e.icon}</div>
          <div class="external-content">
            <div class="external-header">
              <span class="external-name">${e.name}</span>
              <span class="external-type ${typeClass}">${e.type}</span>
            </div>
            <div class="external-impact">${e.impact}</div>
            <div class="external-biomarkers">
              ${e.affectedBiomarkers.map(bm => `<span class="biomarker-tag">${bm}</span>`).join('')}
            </div>
          </div>
        </div>`;
      }
      html += '</div>';
      html += '</div>';

      html += '</div>';

      container.innerHTML = html;

      // Add click handlers for expandable cards (mobile only)
      container.querySelectorAll('.why-card.collapsible').forEach(card => {
        card.addEventListener('click', function(e) {
          // Only enable collapse/expand on mobile (≤767px)
          if (window.innerWidth <= 767) {
            if (e.target.closest('.why-card-header')) {
              const isCollapsed = this.classList.contains('collapsed');
              
              // Collapse all cards first
              container.querySelectorAll('.why-card.collapsible').forEach(c => {
                c.classList.add('collapsed');
              });
              
              // If this card was collapsed, expand it
              if (isCollapsed) {
                this.classList.remove('collapsed');
              }
            }
          }
        });
      });

      // Render hero card separately
      renderHeroCard(score, neg, totalPotential, limNames, helpNames);

      // Animate breakdown bars with delay
      requestAnimationFrame(() => {
        setTimeout(() => {
          container.querySelectorAll('.breakdown-bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.width || '0';
          });
        }, 600);
      });
    }

    function renderHeroCard(score, neg, totalPotential, limNames, helpNames) {
      const heroContainer = document.getElementById('heroCardContainer');
      let html = `<div class="why-card why-hero why-card-span why-delay-3">
    <div class="why-hero-title">What Your Baseline Score Means To You</div>
    <div class="why-hero-body">Your Baseline Score is ${Math.round(score)}/100, which means some systems are working well, while others are lagging. Your body is functioning, but overall stability and resilience are still developing.</div>
    <div class="why-hero-meta">${neg.length} area${neg.length > 1 ? 's' : ''} to improve · ~${Math.round(totalPotential)} points potential</div>
    <div class="why-hero-tags">
      <span class="tag-lim"><strong>Limiting:</strong> ${limNames}</span>
      <span class="tag-help"><strong>Helping:</strong> ${helpNames}</span>
    </div>
  </div>`;
      heroContainer.innerHTML = html;
    }

    function renderInterventionChips() {
      const grid = document.getElementById('interventionsGrid');
      let html = '';
      for (const action of INTERVENTIONS) {
        const isActive = state.selectedActions.has(action.id);
        html += `
      <div class="intervention-chip ${isActive ? 'active' : ''}"
           data-id="${action.id}"
           tabindex="0"
           role="switch"
           aria-checked="${isActive}"
           onclick="toggleAction('${action.id}')"
           onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleAction('${action.id}');}">
        <span class="chip-icon">${action.icon}</span>
        <span class="chip-label">${action.label}</span>
        <div class="chip-toggle">
          <input type="checkbox" ${isActive ? 'checked' : ''} tabindex="-1" aria-hidden="true">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </div>
      </div>`;
      }
      grid.innerHTML = html;
    }

    function renderEstimatedScore() {
      const score = state.estimatedScore;
      const delta = Math.round((score - BASELINE.score) * 10) / 10;
      const band = getBand(score);

      document.getElementById('estCurrent').textContent = BASELINE.score.toFixed(1);

      const newEl = document.getElementById('estNew');
      const currentVal = parseFloat(newEl.textContent) || BASELINE.score;
      animateNumber(newEl, currentVal, score, 500);

      const deltaEl = document.getElementById('estDelta');
      if (delta > 0) {
        deltaEl.textContent = '+' + delta.toFixed(1);
        deltaEl.className = 'est-delta';
      } else {
        deltaEl.textContent = '+0.0';
        deltaEl.className = 'est-delta zero';
      }

      const bandEl = document.getElementById('estBand');
      bandEl.textContent = band.label;
      bandEl.style.color = band.color;
    }

    function renderBiomarkers() {
      const list = document.getElementById('biomarkerList');
      const bms = getImpactedBiomarkers(state.selectedActions);

      if (bms.length === 0) {
        list.innerHTML = '<li class="biomarker-item" style="color:var(--text-muted); font-size:12px;">Toggle actions above to see impacted biomarkers</li>';
        return;
      }

      let html = '';
      for (const bm of bms) {
        html += `
      <li class="biomarker-item">
        <span class="biomarker-dot positive"></span>
        <span class="biomarker-name">${bm.name}</span>
        <span class="biomarker-change positive">+${bm.improvement}%</span>
      </li>`;
      }
      list.innerHTML = html;
    }

    function renderConfidence() {
      const container = document.getElementById('confidenceBadgeContainer');
      const count = state.selectedActions.size;
      if (count === 0) {
        container.innerHTML = '';
        return;
      }
      const conf = getConfidenceLevel(count);
      container.innerHTML = `
    <div class="confidence-badge ${conf.cls}" title="Based on ${count} combined action(s)">
      <span class="confidence-dot"></span>
      ${conf.label} · ${count} action${count > 1 ? 's' : ''}
    </div>`;
    }

    function renderTargetTab() {
      const target = state.targetScore;
      const band = getBand(target);
      const achieve = getAchievability(target);
      const delta = target - BASELINE.score;

      document.getElementById('targetBigNum').textContent = target.toFixed(1);

      const bandLabel = document.getElementById('targetBandLabel');
      bandLabel.textContent = band.label;
      bandLabel.style.color = band.color;

      // Achievability
      const achBox = document.getElementById('achievabilityBox');
      if (delta > 0) {
        achBox.style.display = 'flex';
        achBox.className = 'achievability-box ' + achieve.level;
        achBox.innerHTML = `<span class="achievability-icon">${achieve.icon}</span><span>${achieve.msg}</span>`;
      } else {
        achBox.style.display = 'none';
      }

      // Recommended plan
      const planContainer = document.getElementById('actionPlan');
      const planList = document.getElementById('planActionsList');
      const recommended = recommendActionsForTarget(target);
      state.recommendedPlan = recommended;

      if (delta > 0 && recommended.length > 0) {
        planContainer.style.display = 'block';
        let html = '';
        for (const action of recommended) {
          html += `
        <div class="plan-action-item">
          <span class="plan-action-icon">${action.icon}</span>
          <div class="plan-action-info">
            <div class="plan-action-name">${action.label}</div>
            <div class="plan-action-impact">+${action.effectiveImpact} score points</div>
          </div>
          <span class="plan-action-check">✓</span>
        </div>`;
        }
        planList.innerHTML = html;
      } else {
        planContainer.style.display = 'none';
      }

      // Biomarker improvements
      const bioimpContainer = document.getElementById('biomarkerImprovements');
      const bioimpList = document.getElementById('bioimpList');

      if (delta > 0 && recommended.length > 0) {
        const recIds = new Set(recommended.map(a => a.id));
        const bms = getImpactedBiomarkers(recIds);
        if (bms.length > 0) {
          bioimpContainer.style.display = 'block';
          let html = '';
          for (const bm of bms) {
            const currentRank = 'Current';
            const targetRank = 'Improved';
            html += `
          <div class="bioimp-item">
            <span class="bioimp-name">${bm.name}</span>
            <span class="bioimp-current">${currentRank}</span>
            <span class="bioimp-arrow">→</span>
            <span class="bioimp-target">${targetRank}</span>
            <span class="bioimp-time">${getTimeBand(bm.improvement)}</span>
          </div>`;
          }
          bioimpList.innerHTML = html;
        } else {
          bioimpContainer.style.display = 'none';
        }
      } else {
        bioimpContainer.style.display = 'none';
      }

      // Apply button
      document.getElementById('applyPlanBtn').disabled = delta <= 0 || recommended.length === 0;
    }

    function renderDebug() {
      // Debug drawer removed
    }

    /* ═══════════════════════════════════════════
       EVENT HANDLERS
       ═══════════════════════════════════════════ */

    function toggleAction(id) {
      if (state.selectedActions.has(id)) {
        state.selectedActions.delete(id);
      } else {
        state.selectedActions.add(id);
      }
      state.estimatedScore = calculateNewScore(state.selectedActions);
      renderInterventionChips();
      renderEstimatedScore();
      renderBiomarkers();
      renderConfidence();
      renderDebug();
    }

    function resetAll() {
      state.selectedActions.clear();
      state.estimatedScore = BASELINE.score;
      renderInterventionChips();
      renderEstimatedScore();
      renderBiomarkers();
      renderConfidence();
      renderDebug();
      showToast('All actions reset');
    }

    function scrollToEl(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function switchTab(tabName) {
      if (tabName === 'intervention') {
        window.location.href = 'improve.html';
        return;
      }
      if (tabName === 'score') {
        window.location.href = 'target.html';
        return;
      }
      // Home: update active tab button
      document.querySelectorAll('.mobile-nav-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById('score-card').style.display = 'block';
    }

    /* ═══════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════ */

    function init() {
      renderMainScore();
      renderContributors();
    }

    // Run on DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

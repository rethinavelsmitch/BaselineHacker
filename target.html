<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Goal — Baseline Score</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-black: #040404;
  --bg-card: #0C0C0C;
  --bg-elevated: #121212;
  --red-violet: #CA0F88;
  --electric-blue: #4900FF;
  --royal-purple: #5C05A5;
  --neon-mint: #71F0FF;
  --off-white: #F1F3F6;
  --text-primary: #F1F3F6;
  --text-secondary: rgba(241, 243, 246, 0.75);
  --text-muted: rgba(241, 243, 246, 0.5);
  --border-subtle: rgba(241, 243, 246, 0.08);
  --border-default: rgba(241, 243, 246, 0.15);
  --gradient-main: linear-gradient(135deg, #CA0F88 0%, #5C05A5 50%, #4900FF 100%);
  --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,.4);
  --transition: 240ms cubic-bezier(.4,0,.2,1);
  --green: #22C55E;
  --compromised: #DC2626;
  --struggling: #EA580C;
  --stable: #D97706;
  --healthy: #0D9488;
  --elite: #7C3AED;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-black);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── App Shell ─── */
.app-shell {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 80px;
}

/* ─── Header ─── */
.header {
  background: var(--bg-black);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border-subtle);
}
.header-back {
  background: rgba(255,255,255,.08);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer;
  color: var(--off-white);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  text-decoration: none;
  flex-shrink: 0;
}
.header-back:hover { background: rgba(255,255,255,.12); }
.header-title {
  color: white;
  font-size: 18px;
  font-weight: 700;
  flex: 1;
  text-align: center;
  margin-right: 60px;
}

/* ─── Page Content ─── */
.page { padding: 16px; flex: 1; }

/* ─── Card Base ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

/* ─── SET TARGET Section ─── */
.target-card { padding: 24px 20px; }
.target-header {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}
.target-side {
  display: flex;
  flex-direction: column;
}
.target-side-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.target-side-score {
  font-size: 38px;
  font-weight: 900;
  color: var(--text-secondary);
  line-height: 1;
}
.target-band {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  margin-top: 6px;
}
.target-side.right {
  align-items: flex-end;
}
.target-side.right .target-side-score {
  color: var(--off-white);
}
.target-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 0 8px;
}
.target-arrow-line {
  width: 60%;
  height: 2px;
  border-radius: 1px;
  background: linear-gradient(90deg, var(--text-muted) 0%, var(--green) 100%);
  position: relative;
}
.target-arrow-line::after {
  content: '';
  position: absolute;
  right: -2px;
  top: -3px;
  width: 0;
  height: 0;
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  border-left: 6px solid var(--green);
}
.target-delta {
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  background: rgba(34,197,94,.1);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  white-space: nowrap;
}
.target-delta.zero {
  color: var(--text-muted);
  background: rgba(255,255,255,.05);
}
.target-delta.negative {
  color: #FCA5A5;
  background: rgba(252,165,165,.1);
}

/* Slider */
.slider-wrap { position: relative; padding: 4px 0; margin-bottom: 20px; }
input[type=range] {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  border-radius: var(--radius-full);
  outline: none;
  cursor: pointer;
  background: var(--border-default);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--off-white);
  border: 3px solid var(--bg-card);
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
}
input[type=range]::-webkit-slider-thumb:hover {
  box-shadow: 0 2px 16px rgba(0,0,0,.7);
  transform: scale(1.1);
}


/* ─── REQUIRED ACTIONS Section ─── */
.actions-section { margin-top: 16px; }
.actions-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 20px 20px 16px;
}
.actions-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
}
.actions-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 20px 20px;
}

/* Action Card */
.action-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: all var(--transition);
  cursor: pointer;
}
.action-card:hover {
  border-color: var(--border-default);
  background: rgba(255,255,255,.03);
}
.action-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-md);
  background: rgba(241,243,246,.06);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.action-body { flex: 1; min-width: 0; }
.action-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--off-white);
  line-height: 1.3;
  margin-bottom: 4px;
}
.action-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.4;
}
.action-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.action-pts {
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
}
.action-timeline {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  background: rgba(241,243,246,.06);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  padding: 2px 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.action-arrow {
  font-size: 14px;
  color: var(--text-muted);
  flex-shrink: 0;
  align-self: center;
}

/* ─── Detail Overlay ─── */
.detail-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-black);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 300ms cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.detail-overlay.open {
  transform: translateX(0);
}
.detail-header {
  background: var(--bg-black);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 501;
  border-bottom: 1px solid var(--border-subtle);
}
.detail-back {
  background: rgba(255,255,255,.08);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  cursor: pointer;
  color: var(--off-white);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
}
.detail-back:hover { background: rgba(255,255,255,.28); }
.detail-title {
  color: white;
  font-size: 17px;
  font-weight: 700;
  flex: 1;
  text-align: center;
  margin-right: 80px;
}
.detail-body {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}
.detail-hero {
  text-align: center;
  padding: 24px 0 20px;
}
.detail-hero-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.detail-hero-name {
  font-size: 22px;
  font-weight: 800;
  color: var(--off-white);
  margin-bottom: 8px;
}
.detail-hero-tags {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.detail-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  background: rgba(241,243,246,.06);
  color: var(--text-muted);
  border: 1px solid var(--border-subtle);
}
.detail-section {
  margin-top: 20px;
}
.detail-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.detail-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.detail-section-pill {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--neon-mint);
  background: rgba(113,240,255,.08);
  border-radius: var(--radius-full);
  padding: 4px 10px;
}
.detail-impact-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
}
.detail-impact-pts {
  font-size: 36px;
  font-weight: 900;
  color: var(--green);
  line-height: 1;
}
.detail-impact-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}
.detail-impact-range {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  font-size: 15px;
  font-weight: 700;
}
.detail-impact-from { color: var(--text-secondary); }
.detail-impact-arrow { color: var(--text-muted); font-size: 18px; }
.detail-impact-to { color: var(--green); }
.detail-band-change {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 600;
}
.detail-bm-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.detail-bm-item {
  display: flex;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid rgba(113,240,255,.18);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  gap: 12px;
}
.detail-bm-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(113,240,255,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
  color: var(--neon-mint);
}
.detail-bm-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.detail-bm-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--off-white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-bm-category {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.detail-bm-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  flex-shrink: 0;
  margin-left: auto;
}
.detail-bm-target-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--neon-mint);
  font-weight: 600;
}
.detail-bm-target-value {
  font-size: 14px;
  font-weight: 700;
  color: var(--off-white);
}
.detail-desc-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.detail-subcats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.detail-subcat {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: var(--radius-full);
  background: rgba(113,240,255,.08);
  color: var(--neon-mint);
  border: 1px solid rgba(113,240,255,.15);
}
.detail-protocol-section {
  margin-top: 20px;
}
.detail-protocol-group {
  margin-bottom: 16px;
}
.detail-protocol-group:last-child {
  margin-bottom: 0;
}
.detail-protocol-title {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-secondary);
}
.detail-protocol-card-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.detail-protocol-card {
  flex: 1 1 48%;
  min-width: 0;
  background: var(--bg-elevated);
  border-radius: 16px;
  padding: 10px 12px;
  border: 1px solid var(--border-subtle);
}
.detail-protocol-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--off-white);
  margin-bottom: 2px;
}
.detail-protocol-meta {
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── Filters Card ─── */
.filters-card {
  margin-top: 16px;
  padding: 20px;
}
.filter-group {
  margin-bottom: 16px;
}
.filter-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.focus-chips {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.focus-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 6px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.focus-chip:hover {
  border-color: var(--border-default);
}
.focus-chip-icon {
  font-size: 20px;
  margin-bottom: 6px;
}
.focus-chip-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.focus-chip.active {
  border-color: rgba(113,240,255,.4);
  background: rgba(113,240,255,.08);
}
.focus-chip.active .focus-chip-label {
  color: var(--neon-mint);
}

/* Empty state */
.empty-state {
  padding: 32px 20px;
  text-align: center;
}
.empty-state-icon { font-size: 32px; margin-bottom: 8px; }
.empty-state-text { font-size: 14px; color: var(--text-muted); }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  color: var(--off-white);
  padding: 10px 18px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-md);
  z-index: 9999;
  transition: transform 300ms cubic-bezier(.4,0,.2,1);
  max-width: 90vw;
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── Animations ─── */
.animate-in {
  animation: fadeSlideUp 320ms cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}

/* ─── Responsive Desktop ─── */
@media (min-width: 768px) {
  .app-shell { max-width: 720px; }
  .page { padding: 24px; }
  .target-card { padding: 32px 28px; }
  .target-side-score { font-size: 42px; }
  .actions-list { gap: 12px; }
  .action-card { padding: 20px; }
  .action-name { font-size: 16px; }
}

@media (min-width: 1024px) {
  .app-shell {
    max-width: none;
  }
  .page {
    padding: 32px 48px;
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
    gap: 24px;
    align-items: flex-start;
  }
  .card.target-card,
  .card.actions-section {
    margin: 0;
    box-shadow: var(--shadow-md);
  }
}

/* ─── Mobile Navigation (reference style) ─── */
.mobile-nav {
  position: fixed;
  bottom: 0;
  left: 12px;
  right: 12px;
  background: rgba(28, 28, 30, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 18px 18px 0 0;
  z-index: 100;
  padding: 8px 0 14px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-bottom: none;
}
.mobile-nav::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 3px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 2px;
}
.mobile-nav-tabs {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 50px;
  width: 100%;
  padding: 0 6px;
}
.mobile-nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 10px;
  border: none;
  background: none;
  color: rgba(255, 255, 255, 0.5);
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-sans);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 12px;
  position: relative;
}
.mobile-nav-tab:hover { color: rgba(255, 255, 255, 0.8); }
.mobile-nav-tab.active { color: rgba(255, 255, 255, 1); }
.mobile-nav-tab.active::before {
  content: '';
  position: absolute;
  inset: -2px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  z-index: -1;
}
.mobile-nav-tab.active .mobile-nav-icon {
  animation: navIconBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes navIconBounce {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.mobile-nav-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease;
}
.mobile-nav-icon svg {
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- Header -->
  <header class="header">
    <a href="index.html" class="header-back" title="Back">← Back</a>
    <div class="header-title">Target</div>
  </header>

  <!-- Page -->
  <div class="page">

    <!-- SET TARGET Card -->
    <div class="card target-card animate-in">
      <div class="target-header">
        <div class="target-side">
          <div class="target-side-label">Your Score</div>
          <div class="target-side-score" id="currentScoreLabel">63.7</div>
          <div class="target-band" id="currentBandLabel">Stable</div>
        </div>
        <div class="target-center">
          <div class="target-delta" id="targetDelta">+7.3 pts</div>
          <div class="target-arrow-line"></div>
        </div>
        <div class="target-side right">
          <div class="target-side-label">Target</div>
          <div class="target-side-score" id="targetScoreDisplay">71</div>
          <div class="target-band" id="targetBandLabel">Healthy</div>
        </div>
      </div>

      <div class="slider-wrap">
        <input type="range" id="targetSlider" min="64" max="99" value="71" step="1">
      </div>

const DIMINISHING = 0.82;
const MAX_DELTA = 14.0;

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */

const state = {
  userId: 0,
  targetScore: 71,
  committed: new Set(),
  priorities: new Set()
};

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */

function getUser() { return USERS[state.userId]; }

function getBand(score) {
  for (const b of BANDS) if (score <= b.max) return b;
  return BANDS[BANDS.length - 1];
}

function getImpactForUser(action) {
  const w = action.relevance[state.userId] || 0;
  return Math.round(action.baseImpact * w * 10) / 10;
}

function calcProjectedScore(committedIds) {
  const user = getUser();
  if (committedIds.size === 0) return user.score;
  const actions = ACTION_CATALOGUE.filter(a => committedIds.has(a.id))
    .map(a => ({ ...a, effectiveImpact: getImpactForUser(a) }))
    .sort((a, b) => b.effectiveImpact - a.effectiveImpact);
  let total = 0, factor = 1.0;
  for (const a of actions) {
    total += a.effectiveImpact * factor;
    factor *= DIMINISHING;
  }
  total = Math.min(total, MAX_DELTA);
  return Math.min(99, Math.round((user.score + total) * 10) / 10);
}

function getActionsForGoal() {
  let actions = ACTION_CATALOGUE
    .map(a => ({ ...a, effectiveImpact: getImpactForUser(a) }))
    .filter(a => a.effectiveImpact > 0.3);

  // Priority boost — selected categories get 1.5x SORT weight (display value unchanged)
  if (state.priorities.size > 0) {
    actions = actions.map(a => {
      const group = mapCategoryToGroup(a.category);
      const boost = state.priorities.has(group) ? 1.5 : 1.0;
      return { ...a, sortWeight: a.effectiveImpact * boost };
    });
  } else {
    actions = actions.map(a => ({ ...a, sortWeight: a.effectiveImpact }));
  }

  return actions.sort((a, b) => b.sortWeight - a.sortWeight);
}

/* ════════════════════════════════════════════
   FILTERS
════════════════════════════════════════════ */

const FOCUS_OPTIONS = [
  { key: 'Diet', icon: '🍽️', label: 'DIET' },
  { key: 'Exercise', icon: '⚡', label: 'EXERCISE' },
  { key: 'Sleep', icon: '🌙', label: 'SLEEP' },
  { key: 'Supplements', icon: '💊', label: 'SUPPS' }
];

function mapCategoryToGroup(cat) {
  const map = {
    'Diet': 'Diet',
    'Exercise': 'Exercise',
    'Sleep': 'Sleep',
    'Supplements': 'Supplements',
    'Lifestyle': 'Lifestyle'
  };
  return map[cat] || cat;
}

function timeframeToWeeks(tf) {
  const num = parseInt(tf) || 1;
  if (tf.includes('month')) return num * 4;
  return num; // weeks
}

function renderFilters() {
  const focusEl = document.getElementById('focusChips');
  focusEl.innerHTML = FOCUS_OPTIONS.map(opt =>
    `<div class="focus-chip ${state.priorities.has(opt.key) ? 'active' : ''}"
         onclick="toggleFocus('${opt.key}')">
      <div class="focus-chip-icon">${opt.icon}</div>
      <div class="focus-chip-label">${opt.label}</div>
    </div>`
  ).join('');
}

function toggleFocus(key) {
  if (state.priorities.has(key)) {
    state.priorities.delete(key);
  } else {
    state.priorities.add(key);
  }
  renderFilters();
  renderActions();
}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */

function render() {
  const user = getUser();
  const minScore = Math.ceil(user.score);
  const target = Math.max(minScore, state.targetScore);
  state.targetScore = target;
  const gap = target - user.score;

  // Current score + band
  document.getElementById('currentScoreLabel').textContent = user.score;
  const currentBand = getBand(user.score);
  const currentBandEl = document.getElementById('currentBandLabel');
  currentBandEl.textContent = currentBand.label;
  currentBandEl.style.color = currentBand.color;

  // Slider min = current score (no going backwards)
  const slider = document.getElementById('targetSlider');
  slider.min = minScore;
  slider.value = target;

  // Target display + band
  document.getElementById('targetScoreDisplay').textContent = target;
  const targetBand = getBand(target);
  const targetBandEl = document.getElementById('targetBandLabel');
  targetBandEl.textContent = targetBand.label;
  targetBandEl.style.color = targetBand.color;

  const deltaEl = document.getElementById('targetDelta');
  if (gap > 0) {
    deltaEl.textContent = `+${gap.toFixed(1)} pts`;
    deltaEl.className = 'target-delta';
  } else {
    deltaEl.textContent = '+0.0 pts';
    deltaEl.className = 'target-delta zero';
  }

  // Slider style
  const band = getBand(target);
  const range = 99 - minScore;
  const pct = range > 0 ? ((target - minScore) / range * 100) : 0;
  slider.style.background =
    `linear-gradient(90deg, ${band.color} ${pct}%, rgba(241,243,246,0.12) ${pct}%)`;

  // Filters & Actions
  renderFilters();
  renderActions();
}

function renderActions() {
  const user = getUser();
  const target = state.targetScore;
  const gap = Math.max(0, target - user.score);
  const actions = getActionsForGoal();
  const container = document.getElementById('actionsList');

  if (gap <= 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎯</div>
        <div class="empty-state-text">You're already at or above this target! Raise the bar.</div>
      </div>`;
    return;
  }

  // Find minimal set of actions to close the gap
  let simSet = new Set(), simScore = user.score;
  const neededActions = [];
  for (const a of actions) {
    if (simScore >= target) break;
    const proj = calcProjectedScore(new Set([...simSet, a.id]));
    if (proj > simScore) {
      const marginalPts = Math.round((proj - simScore) * 10) / 10;
      simSet.add(a.id);
      simScore = proj;
      neededActions.push({ ...a, marginalImpact: marginalPts });
    }
  }


  if (neededActions.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div class="empty-state-text">No clear path to this target. Try a lower goal.</div>
      </div>`;
    return;
  }

  container.innerHTML = neededActions.map((action, idx) => {
    const bioNames = action.biomarkers.slice(0, 2).map(b => b.name).join(', ');
    return `
      <div class="action-card" onclick="openDetail('${action.id}')">
        <div class="action-icon">${action.icon}</div>
        <div class="action-body">
          <div class="action-name">${action.label}</div>
          <div class="action-desc">Improves ${bioNames}</div>
          <div class="action-meta">
            <div class="action-pts">+${action.marginalImpact.toFixed(1)} pts</div>
            <div class="action-timeline">${action.timeframe}</div>
          </div>
        </div>
        <div class="action-arrow">&#8250;</div>
      </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   INTERACTIONS
════════════════════════════════════════════ */

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function buildActionInsight(action, impact) {
  const bmNames = (action.biomarkers || []).map(b => b.name);
  if (!bmNames.length) return action.desc || '';

  const joined = bmNames.length === 1
    ? bmNames[0]
    : bmNames.slice(0, -1).join(', ') + ' and ' + bmNames[bmNames.length - 1];

  const pointsText = `${impact.toFixed(1)} point${impact.toFixed(1) === '1.0' ? '' : 's'}`;

  return `Our algorithm looks at your current health profile. Focusing on this action will help improve ${joined}. Together, these changes are projected to increase your Baseline Score by about ${pointsText}.`;
}

function openDetail(actionId) {
  const action = ACTION_CATALOGUE.find(a => a.id === actionId);
  if (!action) return;
  const user = getUser();
  const impact = getImpactForUser(action);
  const bmCount = (action.biomarkers || []).length;
  const currentScore = user.score;
  const projectedScore = Math.min(99, Math.round((currentScore + impact) * 10) / 10);
  const currentBand = getBand(currentScore);
  const projectedBand = getBand(projectedScore);

  const bmHtml = action.biomarkers.map(bm => `
    <div class="detail-bm-item">
      <div class="detail-bm-icon">↗</div>
      <div class="detail-bm-main">
        <div class="detail-bm-name">${bm.name}</div>
        ${bm.category ? `<div class="detail-bm-category">${bm.category}</div>` : ''}
      </div>
      <div class="detail-bm-right">
        <div class="detail-bm-target-label">Target</div>
        <div class="detail-bm-target-value">${bm.to}</div>
      </div>
    </div>`).join('');

  const subcatHtml = (action.subcategories || []).map(s =>
    `<span class="detail-subcat">${s}</span>`).join('');

  const bandChangeHtml = currentBand.label !== projectedBand.label
    ? `<div class="detail-band-change">
        <span style="color:${currentBand.color}">${currentBand.label}</span>
        <span style="color:var(--text-muted)"> &#8594; </span>
        <span style="color:${projectedBand.color}">${projectedBand.label}</span>
      </div>`
    : '';

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero">
      <div class="detail-hero-icon">${action.icon}</div>
      <div class="detail-hero-name">${action.label}</div>
      <div class="detail-hero-tags">
        <span class="detail-tag">${capitalize(action.difficulty)}</span>
        <span class="detail-tag">${action.timeframe}</span>
        <span class="detail-tag">${action.category}</span>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Score Impact</div>
      <div class="detail-impact-card">
        <div class="detail-impact-pts">+${impact.toFixed(1)}</div>
        <div class="detail-impact-label">points increase</div>
        <div class="detail-impact-range">
          <span class="detail-impact-from">${currentScore}</span>
          <span class="detail-impact-arrow">&#8594;</span>
          <span class="detail-impact-to">${projectedScore}</span>
        </div>
        ${bandChangeHtml}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-header">
        <div class="detail-section-title">Biomarkers Affected</div>
        ${bmCount ? `<div class="detail-section-pill">${bmCount} improvements</div>` : ''}
      </div>
      <div class="detail-bm-list">${bmHtml}</div>
    </div>

    ${(action.protocols && action.protocols.length) ? `
    <div class="detail-section detail-protocol-section">
      <div class="detail-section-title">Actions Involved</div>
      ${action.protocols.map(group => `
        <div class="detail-protocol-group">
          <div class="detail-protocol-title">${group.label}</div>
          <div class="detail-protocol-card-row">
            ${group.items.map(item => `
              <div class="detail-protocol-card">
                <div class="detail-protocol-name">${item.name}</div>
                <div class="detail-protocol-meta">${item.meta}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>` : ''}

    ${subcatHtml ? `
    <div class="detail-section">
      <div class="detail-section-title">Related Areas</div>
      <div class="detail-subcats">${subcatHtml}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-section-title">What This Action Does</div>
      <div class="detail-desc-text">${buildActionInsight(action, impact)}</div>
    </div>
  `;

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function setTarget(val) {
  val = parseInt(val);
  if (isNaN(val)) return;
  const minScore = Math.ceil(getUser().score);
  if (val >= 100) val = 99;
  if (val < minScore) val = minScore;
  state.targetScore = val;
  document.getElementById('targetSlider').value = val;
  render();
}

// Slider
document.getElementById('targetSlider').addEventListener('input', function() {
  setTarget(parseInt(this.value));
});

// User switcher
function toggleUserDropdown() {
  document.getElementById('userDropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.header-user')) {
    document.getElementById('userDropdown').classList.remove('open');
  }
});

function switchUser(uid) {
  state.userId = uid;
  state.committed.clear();
  const user = USERS[uid];

  const btn = document.getElementById('userAvatarBtn');
  btn.textContent = user.initials;

  const defaultTarget = Math.min(99, Math.round(user.score) + 10);
  state.targetScore = defaultTarget;
  document.getElementById('targetSlider').value = defaultTarget;

  document.querySelectorAll('.user-option').forEach((el, i) => {
    el.classList.toggle('active', i === uid);
  });

  document.getElementById('userDropdown').classList.remove('open');
  render();
  showToast(`Switched to ${user.name}`);
}

/* ─── Toast ─── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */

window.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  const defaultTarget = Math.min(99, Math.round(user.score) + 7);
  state.targetScore = defaultTarget;
  document.getElementById('targetSlider').value = defaultTarget;
  render();
});
</script>
